function exportData(){
  const data={snapshots,objectifs,dettes,pieces,coursOr,scenarioActif,showHistory,spendeeData,exportDate:new Date().toISOString(),version:'v10'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='finances-ahmed-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();

function importData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!confirm('Cela remplacera toutes tes données actuelles. Continuer ?'))return;
      if(d.snapshots)snapshots=d.snapshots;
      if(d.objectifs)objectifs=d.objectifs;
      if(d.dettes)dettes=d.dettes;
      if(d.pieces)pieces=d.pieces;
      if(d.coursOr)coursOr=d.coursOr;
      if(d.scenarioActif)scenarioActif=d.scenarioActif;
      if(d.spendeeData)spendeeData=d.spendeeData;
      saveAll();
      renderMetrics();renderApercu();
      alert('Données importées !\nExport du '+(d.exportDate?new Date(d.exportDate).toLocaleString('fr-FR'):'date inconnue'));
    }catch(err){alert('Erreur : fichier invalide')}
  };
  reader.readAsText(file);
  input.value='';
}

function calcOrTotal(){return Object.values(pieces).reduce((s,p)=>s+(p.grammes*(coursOr[p.type]||0)),0)}

function calcFinanceSecurise(){return objectifs.reduce((s,o)=>s+(o.finance||0),0)}

function calculs(){
  const s=snapshots[snapshots.length-1];
  const dActifs=dettes.filter(d=>d.statut==='actif').reduce((sum,d)=>sum+d.montant,0);
  const dAnciens=dettes.filter(d=>d.statut==='ancien').reduce((sum,d)=>sum+d.montant,0);
  const orTotal=calcOrTotal();
  const netComptable=s.liquide+s.livretA+orTotal+dActifs+dAnciens-s.credit;
  const cashMobilisable=s.liquide+s.livretA+dActifs-s.credit;
  const financeSecurise=calcFinanceSecurise();
  const cashLibre=cashMobilisable-financeSecurise;
  const epargneReelle=1436;
  return{s,dActifs,dAnciens,orTotal,netComptable,cashMobilisable,cashLibre,financeSecurise,epargneReelle};
}

function monthsUntil(deadlineStr){
  if(!deadlineStr||!deadlineStr.includes('-'))return 6;
  const [y,m]=deadlineStr.split('-').map(Number);
  const today=new Date('2026-04-19');
  const target=new Date(y,m-1,1);
  const diff=(target.getFullYear()-today.getFullYear())*12+(target.getMonth()-today.getMonth());
  return Math.max(1,diff);
}

function formatDeadline(d){
  if(!d||!d.includes('-'))return d||'-';
  const [y,m]=d.split('-');
  const mois=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
  return `${mois[parseInt(m)-1]} ${y}`;
}

  charts['evol']=new Chart(document.getElementById('cEvol'),{

  });

function renderRecommandations(){
  const c=calculs();
  const itemsActifs=objectifs.filter(o=>scenarioActif.includes(o.id));
  const totalParMois=itemsActifs.reduce((s,o)=>s+Math.max(0,o.cible-o.finance)/Math.max(1,monthsUntil(o.deadline)),0);
  const deficit=Math.max(0,totalParMois-c.epargneReelle);
  
  if(deficit<=0)return `<div class="card"><div class="card-title">Recommandations</div><div class="reco-hero"><h3>Tu es sur la bonne trajectoire</h3><p style="font-size:13px;color:#854F0B">Épargne actuelle ${fmt(c.epargneReelle)}/mois couvre les ${fmt(totalParMois)}/mois requis. Marge : +${fmt(c.epargneReelle-totalParMois)}/mois.</p></div></div>`;
  
  return `<div class="card">
    <div class="card-title">Recommandations pour combler le déficit</div>
    <div class="reco-hero">
      <h3>Tu as un déficit de ${fmt(deficit)}/mois à combler</h3>
      <p style="font-size:13px;color:#854F0B">Voici les leviers les plus efficaces. Combine-en 2-3 et tu y es.</p>
    </div>
    <div class="reco-option"><div class="reco-num">1</div><div><div class="reco-title">Dons sadaka temporaires</div><div class="reco-desc">Moyenne historique 350€/mois, mais pics à 2 580-3 228€. Lisser à 200€/mois max pendant 6 mois.</div></div><div class="reco-gain">+150€/mois</div></div>
    <div class="reco-option"><div class="reco-num">2</div><div><div class="reco-title">Plafonner catégorie "Autres"</div><div class="reco-desc">Poste mal labellisé (pics à 1 700-1 900€). Recatégoriser dans Spendee + plafonner à 150€/mois.</div></div><div class="reco-gain">+300€/mois</div></div>
    <div class="reco-option"><div class="reco-num">3</div><div><div class="reco-title">Pause voyages</div><div class="reco-desc">Moyenne 330€/mois + pics à 1 292-1 669€. Pause 6 mois (mai-oct 2026), reprendre pour lune de miel.</div></div><div class="reco-gain">+330€/mois</div></div>
    <div class="reco-option"><div class="reco-num">4</div><div><div class="reco-title">Relancer les Plan Mel</div><div class="reco-desc">3 734€ bloqués 21 mois. Envoyer un message cette semaine.</div></div><div class="reco-gain">+622€/mois si récup</div></div>
    <div class="reco-option"><div class="reco-num">5</div><div><div class="reco-title">Achats non essentiels</div><div class="reco-desc">Mai 2025 : 1 156€ · Jan 2025 : 1 096€. Règle 48h pour tout achat > 100€.</div></div><div class="reco-gain">+200€/mois</div></div>
  </div>`;

        <strong>Tu crées un Pot dédié sur Yuh pour chaque gros objectif.</strong><br/>
        Chaque mois, tu vires de l'argent vers tes Pots. Après ton virement, clique <strong>"+ Ajouter"</strong> ici pour indiquer ce que tu as sécurisé.<br/>

function updateObj(id,field,val){objectifs=objectifs.map(o=>o.id===id?{...o,[field]:val}:o);saveAll()}
function addFinance(id,sign){const v=parseFloat(document.getElementById('inp-'+id).value);if(!v||v<=0)return;objectifs=objectifs.map(o=>o.id===id?{...o,finance:Math.max(0,o.finance+sign*v)}:o);saveAll();renderObjectifs();renderMetrics();document.getElementById('inp-'+id).value=''}
function updateCible(id){const v=parseFloat(document.getElementById('cible-'+id).value);if(!v||v<=0)return;objectifs=objectifs.map(o=>o.id===id?{...o,cible:v}:o);saveAll();renderObjectifs()}
function toggleCritique(id){objectifs=objectifs.map(o=>o.id===id?{...o,critique:!o.critique}:o);saveAll();renderObjectifs();renderMetrics()}
function removeObj(id){if(!confirm('Supprimer ?'))return;objectifs=objectifs.filter(o=>o.id!==id);scenarioActif=scenarioActif.filter(x=>x!==id);saveAll();renderObjectifs();renderMetrics()}
function addObj(){const nom=document.getElementById('oNom').value;const cible=parseFloat(document.getElementById('oCible').value);if(!nom||!cible){alert('Nom et cible requis');return}const maxP=objectifs.reduce((m,o)=>Math.max(m,o.priorite),0);objectifs.push({id:'obj'+Date.now(),nom,cible,finance:parseFloat(document.getElementById('oFin').value)||0,deadline:document.getElementById('oDead').value||'',couleur:document.getElementById('oCouleur').value,note:document.getElementById('oNote').value||'',priorite:maxP+1,critique:document.getElementById('oCritique').checked});saveAll();renderObjectifs();renderMetrics()}

function renderScenarios(){
  const c=calculs();
  const checkboxes=objectifs.sort((a,b)=>a.priorite-b.priorite).map(o=>{
    const checked=scenarioActif.includes(o.id);
    const restant=o.cible-o.finance;
    return`<label class="checkbox-item ${checked?'checked':''}">
      <input type="checkbox" ${checked?'checked':''} onchange="toggleScenario('${o.id}')">
      <div style="flex:1">
        <div style="font-weight:500">${o.nom}</div>
        <div style="font-size:11px;color:#888780">Reste : ${fmt(restant)} · ${formatDeadline(o.deadline)}</div>
      </div>
    </label>`;
  }).join('');
  const itemsActifs=objectifs.filter(o=>scenarioActif.includes(o.id));
  const totalActif=itemsActifs.reduce((s,o)=>s+Math.max(0,o.cible-o.finance),0);
  const gapActif=Math.max(0,totalActif-c.cashMobilisable);
  const maxMois=itemsActifs.length?Math.max(...itemsActifs.map(o=>monthsUntil(o.deadline))):6;
  const totalParMois=itemsActifs.reduce((s,o)=>s+Math.max(0,o.cible-o.finance)/Math.max(1,monthsUntil(o.deadline)),0);
  
  let calendarRows='';
  for(let i=0;i<maxMois;i++){
    const monthYear=new Date(2026,4+i,1);
    const moisNoms=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
    const moisStr=`${moisNoms[monthYear.getMonth()]} ${monthYear.getFullYear()}`;
    let totalMois=0;
    const contribs=[];
    itemsActifs.forEach(o=>{
      const deadlineDate=new Date(o.deadline+'-01');
      if(monthYear<=deadlineDate){
        const mois=monthsUntil(o.deadline);
        const restant=Math.max(0,o.cible-o.finance);
        const parMois=restant/Math.max(1,mois);
        totalMois+=parMois;
        contribs.push({nom:o.nom,val:parMois,couleur:o.couleur});
      }
    });
    let pills=contribs.map(cb=>`<span class="badge" style="background:${cb.couleur}15;color:${cb.couleur};margin-right:4px">${cb.nom.slice(0,12)} ${fmt(cb.val)}</span>`).join('');
    calendarRows+=`<div class="table-row" style="grid-template-columns:1fr 1fr 3fr">
      <span style="font-weight:500">${moisStr}</span>
      <span style="color:#185FA5;font-weight:500">${fmt(totalMois)}</span>
      <span style="font-size:11px">${pills||'<span style="color:#888780">—</span>'}</span>
    </div>`;
  }
  
  document.getElementById('tab-scenarios').innerHTML=`
    <div class="card">
      <div class="card-title">Composer ton scénario</div>
      <p style="font-size:12px;color:#888780;margin-bottom:10px">Coche les objectifs à poursuivre. Les calculs se mettent à jour partout.</p>
      ${checkboxes}
    </div>
    <div class="card">
      <div class="gap-explain">
        <strong>Explication Gap :</strong> montant manquant aujourd'hui pour payer les objectifs cochés.<br/>
        <em>Besoin total</em> (${fmt(totalActif)}) <strong>−</strong> <em>Cash mobilisable</em> (${fmt(c.cashMobilisable)}) <strong>=</strong> <strong>${fmt(gapActif)}</strong>
      </div>
      <div class="card-title">Plan global</div>
      ${totalParMois>0?`<div class="alert ${c.epargneReelle>=totalParMois?'info':'warn'}"><strong>Virement :</strong> ${fmt(totalParMois)} le 5 de chaque mois vers tes Pots Yuh.</div>`:''}
      <div class="row"><span style="color:#888780">Besoin total</span><strong>${fmt(totalActif)}</strong></div>
      <div class="row"><span style="color:#888780">Cash mobilisable</span><strong>${fmt(c.cashMobilisable)}</strong></div>
      <div class="row"><span style="color:#888780">Gap</span><strong style="color:${gapActif>0?'#A32D2D':'#0F6E56'}">${fmt(gapActif)}</strong></div>
      <div class="row"><span style="color:#888780">Total/mois</span><strong style="color:#185FA5">${fmt(totalParMois)}</strong></div>
      <div class="row"><span style="color:#888780">Épargne réelle</span><strong style="color:#0F6E56">${fmt(c.epargneReelle)}/mois</strong></div>
      <div class="row"><span style="color:#888780">Marge</span><strong style="color:${c.epargneReelle>=totalParMois?'#0F6E56':'#A32D2D'}">${c.epargneReelle>=totalParMois?'+':''}${fmt(c.epargneReelle-totalParMois)}/mois</strong></div>
    </div>
    ${itemsActifs.length?`<div class="card">
      <div class="card-title">Calendrier intelligent</div>
      <p style="font-size:12px;color:#888780;margin-bottom:12px">Allocation parallèle par deadline.</p>
      <div class="table-head" style="grid-template-columns:1fr 1fr 3fr"><span>Mois</span><span>Total</span><span>Répartition</span></div>
      ${calendarRows}
    </div>`:''}
  `;
}
function toggleScenario(id){if(scenarioActif.includes(id)){scenarioActif=scenarioActif.filter(x=>x!==id)}else{scenarioActif=[...scenarioActif,id]}saveAll();renderScenarios();renderMetrics()}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">Historique (${snapshots.length} relevés)</div>
        <button class="toolbar-btn" onclick="toggleHistory()">${showHistory?'▼ Masquer':'▶ Afficher'}</button>
      </div>
      ${showHistory?`<div class="table-head" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 0.4fr">
        <span>Date</span><span>Liquide</span><span>Livret A</span><span>Or</span><span>Crédit</span><span>Net</span><span></span>
      </div>
      ${[...snapshots].reverse().map(s=>`<div class="table-row" style="grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 0.4fr">
        <span style="color:#888780;font-size:12px">${s.date}</span>
        <span>${fmt(s.liquide)}</span>
        <span>${fmt(s.livretA)}</span>
        <span style="color:#854F0B">${fmt(s.or)}</span>
        <span style="color:#A32D2D">-${fmt(s.credit)}</span>
        <span style="font-weight:500">${fmt(s.net)}</span>
        <span class="delete-icon" onclick="removeSnapshot(${s.id})">×</span>
      </div>`).join('')}`:'<p style="color:#888780;padding:8px 0;font-size:12px">Cliquer pour afficher</p>'}
    </div>
  `;
}
function toggleHistory(){showHistory=!showHistory;saveAll();renderDetail()}
function addSnapshot(){const date=document.getElementById('sDate').value;const liquide=parseFloat(document.getElementById('sLiquide').value)||0;const livretA=parseFloat(document.getElementById('sLivretA').value)||0;const or=parseFloat(document.getElementById('sOr').value)||0;let dettesVal=parseFloat(document.getElementById('sDettes').value);if(isNaN(dettesVal))dettesVal=dettes.reduce((s,d)=>s+d.montant,0);const credit=parseFloat(document.getElementById('sCredit').value)||0;if(!date){alert('Date requise');return}const net=liquide+livretA+or+dettesVal-credit;snapshots=[...snapshots,{id:Date.now(),date,liquide,livretA,or,dettes:dettesVal,credit,net}].sort((a,b)=>a.date.localeCompare(b.date));saveAll();renderMetrics();renderDetail()}
function removeSnapshot(id){if(!confirm('Supprimer ?'))return;if(snapshots.length<=1){alert('Impossible');return}snapshots=snapshots.filter(s=>s.id!==id);saveAll();renderMetrics();renderDetail()}

    </div>

        <strong>Sur iPhone :</strong><br/>
        4. Ouvre <code style="background:#E0E0E0;padding:1px 5px;border-radius:3px">bebinho51.github.io/Finance</code><br/>
        5. Va dans l'onglet <strong>🔄 Sync</strong><br/>
        6. Appuie sur <strong>Importer</strong> puis sélectionne le fichier JSON<br/>
        7. Tes données apparaissent
      </div>
    </div>
    <div class="card">
      <div class="card-title">📱 vers 💻</div>
      <div style="background:#F5F5F0;border-radius:8px;padding:14px;font-size:13px;line-height:1.9">
        <strong>Sur iPhone :</strong><br/>

function exportDataSync(){
  const data={snapshots,objectifs,dettes,pieces,coursOr,scenarioActif,showHistory,spendeeData,exportDate:new Date().toISOString(),version:'v10'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='finances-ahmed-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('ahmed10-lastexport',new Date().toISOString());
  renderSync();
}

function importDataSync(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!confirm('Cela remplacera TOUTES tes données actuelles sur cet appareil. Continuer ?'))return;
      if(d.snapshots)snapshots=d.snapshots;
      if(d.objectifs)objectifs=d.objectifs;
      if(d.dettes)dettes=d.dettes;
      if(d.pieces)pieces=d.pieces;
      if(d.coursOr)coursOr=d.coursOr;
      if(d.scenarioActif)scenarioActif=d.scenarioActif;
      if(d.spendeeData)spendeeData=d.spendeeData;
      saveAll();
      localStorage.setItem('ahmed10-lastimport',new Date().toISOString());
      renderMetrics();
      renderSync();
      alert('Données importées avec succès');
    }catch(err){alert('Erreur : fichier invalide')}
  };
  reader.readAsText(file);
  input.value='';
}

renderMetrics();
renderApercu();
